<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn PDF Downloader</title>
  <link rel="stylesheet" href="styles/popup.css" />
</head>
<body>

  <div class="shell">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="4" fill="#0A66C2"/>
          <path d="M5 8.5H7.8V17H5V8.5ZM6.4 7.3C5.52 7.3 5 6.75 5 6.05C5 5.33 5.54 4.8 6.43 4.8C7.32 4.8 7.82 5.33 7.84 6.05C7.84 6.75 7.32 7.3 6.4 7.3ZM17 17H14.2V12.4C14.2 11.24 13.78 10.44 12.76 10.44C11.98 10.44 11.5 10.98 11.28 11.5C11.2 11.7 11.18 11.98 11.18 12.26V17H8.38V9.26C8.38 8.14 8.34 7.2 8.3 8.5H8.38V8.5H11.04L11.1 9.74C11.48 9.14 12.16 8.3 13.74 8.3C15.7 8.3 17 9.42 17 12.06V17Z" fill="white"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">PDF Downloader</h1>
        <span class="header-sub">LinkedIn Connections</span>
      </div>
      <div class="status-dot" id="status-dot" title="Idle"></div>
    </header>

    <!-- ── Upload Zone ── -->
    <section class="section" id="upload-section">
      <label class="dropzone" id="dropzone" for="csv-input">
        <input type="file" id="csv-input" accept=".csv" hidden />
        <svg class="drop-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-3-3v6M3 12a9 9 0 1 0 18 0A9 9 0 0 0 3 12z"/>
        </svg>
        <span class="drop-label">Drop CSV file or <em>click to browse</em></span>
        <span class="drop-hint">One LinkedIn profile URL per row</span>
      </label>

      <div class="file-meta hidden" id="file-meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        <span id="file-name-label">—</span>
        <span class="pill" id="url-count-pill">0 URLs</span>
      </div>
    </section>

    <!-- ── Alert Banner ── -->
    <div class="alert hidden" id="alert-banner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alert-text"></span>
    </div>

    <!-- ── Wait Time Slider ── -->
    <section class="section slider-section" id="slider-section">
      <div class="slider-label">
        <span>Wait Time Between Profiles</span>
        <span class="slider-value" id="slider-value">5s</span>
      </div>
      <input type="range" id="wait-time-slider" class="slider" min="3" max="15" value="5" />
      <div class="slider-hint">Recommended: 5 seconds • Sets delay after each PDF download</div>
    </section>

    <!-- ── Estimated Time ── -->
    <section class="section estimate-section hidden" id="estimate-section">
      <div class="estimate-card">
        <div class="estimate-title">⏱️ Estimated Time</div>
        <div class="estimate-value" id="estimate-value">0s</div>
        <div class="estimate-hint">Do not use the browser during this time</div>
      </div>
    </section>

    <!-- ── Progress ── -->
    <section class="section progress-section hidden" id="progress-section">
      <div class="progress-meta">
        <span class="progress-frac" id="progress-frac">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="current-url" id="current-url">—</div>
    </section>

    <!-- ── Controls ── -->
    <div class="controls">
      <button class="btn btn-primary" id="start-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Start Download
      </button>
      <button class="btn btn-warning hidden" id="pause-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        Pause
      </button>
      <button class="btn btn-success hidden" id="resume-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Resume
      </button>
      <button class="btn btn-danger hidden" id="stop-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        Stop
      </button>
    </div>

    <!-- ── Stats Row ── -->
    <div class="stats-row hidden" id="stats-row">
      <div class="stat">
        <span class="stat-val" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-val stat-fail" id="stat-fail">0</span>
        <span class="stat-label">Failed</span>
      </div>
      <div class="stat">
        <span class="stat-val stat-remain" id="stat-remain">0</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>

    <!-- ── Log ── -->
    <section class="log-section hidden" id="log-section">
      <div class="log-header">
        <span>Activity Log</span>
        <button class="btn-clear" id="clear-log-btn">Clear</button>
      </div>
      <ul class="log-list" id="log-list"></ul>
    </section>

  </div><!-- /.shell -->

  <script src="src/ui/popup-script.js" type="module"></script>
</body>
</html>
