<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn PDF Downloader - Progress Monitor</title>
  <link rel="stylesheet" href="styles/progress.css" />
</head>
<body>
  <div class="shell">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <svg width="24" height="24" viewBox="0 0 22 22" fill="none">
          <rect width="22" height="22" rx="4" fill="#0A66C2"/>
          <path d="M5 8.5H7.8V17H5V8.5ZM6.4 7.3C5.52 7.3 5 6.75 5 6.05C5 5.33 5.54 4.8 6.43 4.8C7.32 4.8 7.82 5.33 7.84 6.05C7.84 6.75 7.32 7.3 6.4 7.3ZM17 17H14.2V12.4C14.2 11.24 13.78 10.44 12.76 10.44C11.98 10.44 11.5 10.98 11.28 11.5C11.2 11.7 11.18 11.98 11.18 12.26V17H8.38V9.26C8.38 8.14 8.34 7.2 8.3 8.5H8.38V8.5H11.04L11.1 9.74C11.48 9.14 12.16 8.3 13.74 8.3C15.7 8.3 17 9.42 17 12.06V17Z" fill="white"/>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="header-title">Progress Monitor</h1>
        <span class="header-sub">LinkedIn PDF Downloader</span>
      </div>
      <div class="status-dot" id="status-dot" title="Idle"></div>
    </header>

    <!-- Content -->
    <div class="content">
      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Downloaded</div>
          <div class="stat-value done" id="stat-done">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Failed</div>
          <div class="stat-value fail" id="stat-fail">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Remaining</div>
          <div class="stat-value remain" id="stat-remain">0</div>
        </div>
      </div>

      <!-- Progress Section -->
      <div class="progress-section">
        <div class="progress-label">
          <span id="progress-frac">0 / 0</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="current-activity" id="current-url">—</div>
      </div>

      <!-- Activity Log -->
      <div class="log-section" id="log-section"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-warning" id="pause-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        Pause
      </button>
      <button class="btn btn-success hidden" id="resume-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        Resume
      </button>
      <button class="btn btn-danger" id="stop-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="1"/>
        </svg>
        Stop
      </button>
    </div>
  </div>

  <script src="src/ui/progress-script.js" type="module"></script>
</body>
</html>
